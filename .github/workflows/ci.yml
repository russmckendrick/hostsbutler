name: 🔍 CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 🛠️ Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🎨 Check formatting
        run: cargo fmt --check

      - name: 📎 Clippy
        run: cargo clippy -- -D warnings

      - name: 🔨 Build
        run: cargo build --release

      - name: 🧪 Test
        run: cargo test

  build:
    name: 📦 Build (${{ matrix.artifact }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hostsbutler-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: hostsbutler-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: hostsbutler-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: hostsbutler-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: hostsbutler-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: 📋 Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/hostsbutler ${{ matrix.artifact }}

      - name: 📋 Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/hostsbutler.exe ${{ matrix.artifact }}

      - name: 🔐 Generate checksum (Unix)
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: 🔐 Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ${{ matrix.artifact }}).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii ${{ matrix.artifact }}.sha256

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: 🎉 Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 📂 Collect release files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true
